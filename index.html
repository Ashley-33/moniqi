<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>老夫人模拟器</title>
<style>
  :root{
    --ink:#2b2018;            /* 主文字 */
    --ink-soft:#6a5a48;       /* 次要文字 */
    --paper:#f4ead6;          /* 纸底 */
    --paper-2:#efe2c8;        /* 卡片底 */
    --gold:#b08a3e;           /* 金 */
    --gold-deep:#8a6a26;
    --red:#7c2a23;            /* 朱砂 */
    --red-soft:#9a3a30;
    --jade:#3f6b54;           /* 墨绿 */
    --line:#d8c7a4;
    --shadow:0 10px 40px rgba(60,40,20,.18);
    --radius:16px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:"PingFang SC","Songti SC","STSong","Noto Serif SC",serif;
    color:var(--ink);
    background:
      radial-gradient(1200px 700px at 50% -10%, #fbf3e2 0%, transparent 60%),
      linear-gradient(160deg,#2a1d16 0%, #3a281c 40%, #221610 100%);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:760px;margin:0 auto;padding:11px 10px 44px}
  .hidden{display:none !important}

  /* 顶部标题条 */
  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
  .brand{display:flex;align-items:center;gap:10px;color:#f3e6c8}
  .brand .seal{
    width:38px;height:38px;border-radius:9px;display:grid;place-items:center;
    background:linear-gradient(145deg,var(--red),#5e1d18);color:#f6e3b8;
    font-weight:700;box-shadow:0 4px 14px rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.12);
  }
  .brand .t{font-size:18px;letter-spacing:2px}
  .brand .t small{display:block;font-size:11px;color:#cdbb95;letter-spacing:1px;font-weight:400}
  .iconbtn{
    background:rgba(255,255,255,.08);color:#f0e3c4;border:1px solid rgba(255,255,255,.16);
    width:40px;height:40px;border-radius:11px;font-size:18px;cursor:pointer;transition:.15s;
  }
  .iconbtn:hover{background:rgba(255,255,255,.16)}

  /* 卡片 */
  .card{
    background:linear-gradient(180deg,var(--paper) 0%, var(--paper-2) 100%);
    border:1px solid var(--line);border-radius:var(--radius);
    box-shadow:var(--shadow);overflow:hidden;
  }
  .card.pad{padding:22px}

  /* ====== 首页 · 模式选择 ====== */
  .home-hero{text-align:center;padding:14px 8px 18px}
  .home-hero h1{margin:0;font-size:25px;letter-spacing:5px;color:var(--ink)}
  .home-hero p{margin:8px 0 0;font-size:13px;color:var(--ink-soft);letter-spacing:1px}
  .mode-list{display:flex;flex-direction:column;gap:12px}
  .mode-card{
    display:flex;align-items:center;gap:14px;width:100%;text-align:left;cursor:pointer;
    background:#fbf5e6;border:1.5px solid var(--line);border-radius:14px;padding:16px 16px;
    font:inherit;color:var(--ink);transition:.15s;
  }
  .mode-card:hover{border-color:var(--gold);background:#fdf8ec;transform:translateY(-1px)}
  .mc-seal{
    width:52px;height:52px;flex:none;border-radius:13px;display:grid;place-items:center;
    font-size:26px;font-weight:700;color:#f6e3b8;box-shadow:0 4px 14px rgba(0,0,0,.2);
    border:1px solid rgba(255,255,255,.15)
  }
  .mc-seal.q{background:linear-gradient(145deg,var(--red),#5e1d18)}
  .mc-seal.r{background:linear-gradient(145deg,var(--jade),#2c4d3c)}
  .mc-body{flex:1;min-width:0}
  .mc-name{font-size:17px;font-weight:700;letter-spacing:1px}
  .mc-name .cont{font-size:11px;font-weight:700;color:var(--jade);margin-left:8px}
  .mc-desc{font-size:12.5px;color:var(--ink-soft);line-height:1.5;margin-top:4px}
  .mc-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
  .mc-tags span{font-size:10.5px;color:var(--gold-deep);border:1px solid var(--line);border-radius:999px;padding:2px 9px;background:#f3ead7}
  .mc-arrow{font-size:24px;color:var(--gold);flex:none}

  /* ====== 数值面板 ====== */
  .panel{
    background:linear-gradient(180deg,#fbf4e3,#f1e4c9);
    border:1px solid var(--line);border-radius:var(--radius);
    box-shadow:var(--shadow);padding:14px 16px;margin-bottom:14px;position:sticky;top:8px;z-index:20;
    backdrop-filter:blur(2px);
  }
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px 14px}
  .stat .lab{display:flex;justify-content:space-between;font-size:12px;color:var(--ink-soft);margin-bottom:3px}
  .stat .lab b{color:var(--ink);font-weight:600}
  .stat .lab .num{font-variant-numeric:tabular-nums;font-weight:700}
  .bar{height:7px;border-radius:6px;background:#e3d4b2;overflow:hidden}
  .bar > i{display:block;height:100%;border-radius:6px;transition:width .5s ease}
  .b-good > i{background:linear-gradient(90deg,#5a8f6e,#3f6b54)}
  .b-fame > i{background:linear-gradient(90deg,#cf9b46,#a8761f)}
  .b-health > i{background:linear-gradient(90deg,#c9564b,#9a2f26)}
  .b-intel > i{background:linear-gradient(90deg,#5d7fb0,#3c5a86)}
  .stat .chip{font-size:11px;font-weight:700}
  .stat .chip.up{color:var(--jade)} .stat .chip.down{color:var(--red-soft)}
  .power-row{margin-top:11px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;
    border-top:1px dashed var(--line);padding-top:10px}
  .power-row .k{font-size:12px;color:var(--ink-soft)}
  .power-tag{
    font-size:12px;font-weight:700;color:#fff;padding:3px 12px;border-radius:999px;letter-spacing:1px;
    background:linear-gradient(135deg,var(--gold),var(--gold-deep));box-shadow:0 3px 10px rgba(138,106,38,.3)
  }
  .power-row .desc{font-size:12px;color:var(--ink-soft);flex:1;min-width:140px}
  .silver{color:var(--gold-deep);font-weight:700}

  /* ====== 剧情区 ====== */
  .scene{padding:20px 20px 6px}
  .scene .meta{font-size:12px;color:var(--gold-deep);letter-spacing:2px;margin-bottom:8px}
  .scene .body{font-size:16px;line-height:2;color:var(--ink);white-space:pre-wrap;word-break:break-word}
  .changes{margin:14px 20px 4px;display:flex;flex-wrap:wrap;gap:8px}
  .changes .c{font-size:12px;padding:4px 10px;border-radius:8px;background:#efe1c2;border:1px solid var(--line)}
  .changes .c.up{color:var(--jade)} .changes .c.down{color:var(--red-soft)}

  /* ====== 选项（紧凑·手机优先） ====== */
  .choices{padding:4px 12px 14px}
  .choices .hint{font-size:11.5px;color:var(--ink-soft);padding:2px 4px 8px;display:flex;align-items:center;gap:5px}
  .opt{
    display:flex;gap:9px;align-items:flex-start;width:100%;text-align:left;cursor:pointer;
    background:#fbf5e6;border:1.5px solid var(--line);border-radius:10px;padding:8px 11px;margin-bottom:6px;
    transition:.12s;
  }
  .opt:hover{border-color:var(--gold);background:#fdf8ec}
  .opt.sel{border-color:var(--red);background:#fbeee6;box-shadow:0 0 0 2px rgba(124,42,35,.12) inset}
  .opt .box{
    width:19px;height:19px;border-radius:5px;border:2px solid var(--line);flex:none;margin-top:2px;
    display:grid;place-items:center;font-size:12px;color:#fff;transition:.12s
  }
  .opt.sel .box{background:var(--red);border-color:var(--red)}
  .opt .txt{flex:1;min-width:0}
  /* 路线标签内联在标题前,省一行高度 */
  .opt .rt{display:inline-block;font-size:10.5px;font-weight:700;letter-spacing:1px;padding:1px 6px;border-radius:5px;margin-right:6px;vertical-align:2px}
  .rt-保守,.rt-持家{background:#e3eee6;color:var(--jade)}
  .rt-强攻,.rt-严教{background:#f6e0dc;color:var(--red)}
  .rt-隐忍,.rt-慈和{background:#ece3f0;color:#6b4b86}
  .rt-布局,.rt-张罗{background:#e6ecf6;color:#3c5a86}
  .opt .ti{display:inline;font-size:14.5px;font-weight:600}
  .opt .de{font-size:12.5px;color:var(--ink-soft);line-height:1.4;margin-top:2px}
  .opt .nochoice{font-size:13px;color:var(--ink-soft);line-height:1.7;padding:10px 4px;text-align:center}

  .actbar{display:flex;gap:10px;padding:4px 6px 6px}
  .btn{
    flex:1;border:none;border-radius:12px;padding:14px;font:inherit;font-size:16px;font-weight:700;
    letter-spacing:2px;cursor:pointer;transition:.15s
  }
  .btn-main{background:linear-gradient(135deg,var(--red),#5e1d18);color:#f6e3b8;box-shadow:0 6px 18px rgba(124,42,35,.35)}
  .btn-main:hover{filter:brightness(1.06)}
  .btn-main:disabled{opacity:.5;cursor:not-allowed;filter:none}
  .btn-ghost{flex:none;background:transparent;border:1.5px solid var(--line);color:var(--ink-soft);padding:14px 16px}
  .btn-ghost:hover{border-color:var(--gold);color:var(--gold-deep)}

  /* ====== 开始页 ====== */
  .hero{text-align:center;padding:40px 24px 30px}
  .hero .seal-big{
    width:88px;height:88px;border-radius:20px;margin:0 auto 18px;display:grid;place-items:center;
    color:#f6e3b8;font-size:34px;font-weight:700;
    box-shadow:0 10px 30px rgba(124,42,35,.4);border:1px solid rgba(255,255,255,.15)
  }
  .hero .seal-big.q{background:linear-gradient(145deg,var(--red),#531a15)}
  .hero .seal-big.r{background:linear-gradient(145deg,var(--jade),#274635)}
  .hero h1{margin:0;font-size:28px;letter-spacing:6px;color:var(--ink)}
  .hero .sub{color:var(--ink-soft);font-size:14px;margin:10px 0 0;line-height:1.9}
  .hero .lines{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin:18px 0 24px}
  .hero .lines span{font-size:12px;color:var(--gold-deep);border:1px solid var(--line);border-radius:999px;padding:4px 12px;background:#fbf4e3}
  .notice{
    margin:0 24px 18px;font-size:13px;color:var(--red);background:rgba(124,42,35,.07);
    border:1px solid rgba(124,42,35,.25);border-radius:10px;padding:10px 14px;cursor:pointer
  }
  .notice:hover{background:rgba(124,42,35,.12)}
  .start-actions{padding:0 24px 34px;display:flex;flex-direction:column;gap:10px}
  .foot{text-align:center;font-size:12px;color:var(--ink-soft);padding:0 24px 26px}

  /* ====== 设置页 ====== */
  .settings h2{margin:0 0 4px;font-size:20px;letter-spacing:2px}
  .settings .lead{font-size:13px;color:var(--ink-soft);margin:0 0 18px;line-height:1.8}
  .field{margin-bottom:16px}
  .field label{display:block;font-size:13px;font-weight:600;margin-bottom:6px}
  .field input,.field select,.field textarea{
    width:100%;border:1.5px solid var(--line);border-radius:10px;padding:11px 12px;font:inherit;font-size:14px;
    background:#fffaf0;color:var(--ink)
  }
  .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--gold)}
  .field .hint{font-size:12px;color:var(--ink-soft);margin-top:6px;line-height:1.7}
  .field .hint a{color:var(--gold-deep)}
  .settings .row{display:flex;gap:10px}
  .settings .row .field{flex:1}

  /* ====== 结局页 ====== */
  .ending{padding:30px 24px 10px;text-align:center}
  .ending .ribbon{font-size:13px;color:var(--gold-deep);letter-spacing:4px;margin-bottom:8px}
  .ending .et{display:inline-block;font-size:13px;font-weight:700;color:#fff;padding:5px 16px;border-radius:999px;
    background:linear-gradient(135deg,var(--gold),var(--gold-deep));margin-bottom:14px;letter-spacing:2px}
  .ending h1{font-size:26px;letter-spacing:3px;margin:0 0 16px;color:var(--ink)}
  .ending .summary{font-size:15px;line-height:2;color:var(--ink);text-align:left;white-space:pre-wrap}
  .ending .epitaph{
    margin:20px 0;padding:16px 18px;border-left:3px solid var(--red);background:rgba(124,42,35,.05);
    border-radius:0 10px 10px 0;font-size:15px;line-height:1.9;color:var(--red);text-align:left;font-style:italic
  }
  .achieve{padding:6px 24px 10px}
  .achieve h3{font-size:15px;letter-spacing:2px;color:var(--gold-deep);margin:18px 0 10px;
    display:flex;align-items:center;gap:8px}
  .achieve h3::before,.achieve h3::after{content:"";flex:1;height:1px;background:var(--line)}
  .ach-list{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:8px}
  .ach-list li{display:flex;gap:10px;align-items:flex-start;font-size:14px;line-height:1.6;
    background:#fbf4e3;border:1px solid var(--line);border-radius:10px;padding:10px 12px}
  .ach-list li::before{content:"✦";color:var(--gold);flex:none}
  .final-stats{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;padding:6px 24px 20px}
  .final-stats .fs{display:flex;justify-content:space-between;font-size:13px;background:#fbf4e3;
    border:1px solid var(--line);border-radius:8px;padding:8px 12px}
  .final-stats .fs b{color:var(--gold-deep)}

  /* ====== 加载 / 错误 ====== */
  .loading{display:flex;flex-direction:column;align-items:center;gap:14px;padding:48px 24px;color:var(--ink-soft)}
  .spinner{width:34px;height:34px;border:3px solid var(--line);border-top-color:var(--red);border-radius:50%;
    animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .loading .tip{font-size:13px;animation:pulse 1.6s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
  .errbox{margin:14px 20px;padding:12px 14px;border-radius:10px;background:rgba(124,42,35,.08);
    border:1px solid rgba(124,42,35,.3);color:var(--red);font-size:13px;line-height:1.7}

  /* toast */
  #toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(20px);opacity:0;
    background:#2b2018;color:#f3e6c8;padding:10px 18px;border-radius:999px;font-size:13px;transition:.25s;z-index:99;pointer-events:none}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  @media (max-width:560px){
    .wrap{padding:11px 10px 44px}
    .topbar{margin-bottom:10px}
    .brand .seal{width:32px;height:32px;border-radius:8px;font-size:15px}
    .brand .t{font-size:16px;letter-spacing:1px}
    .brand .t small{font-size:10px;letter-spacing:0}
    .iconbtn{width:36px;height:36px;font-size:16px}

    .home-hero{padding:10px 6px 14px}
    .home-hero h1{font-size:22px;letter-spacing:4px}
    .mode-card{padding:13px 13px;gap:11px}
    .mc-seal{width:46px;height:46px;font-size:23px}
    .mc-name{font-size:16px}

    .panel{padding:10px 12px;margin-bottom:10px;border-radius:13px;top:6px}
    .stats{grid-template-columns:repeat(2,1fr);gap:8px 12px}
    .stat .lab{font-size:11px;margin-bottom:2px}
    .bar{height:6px}
    .power-row{margin-top:8px;padding-top:8px;gap:7px}
    .power-row .desc{font-size:11px;min-width:0;flex-basis:100%}

    .scene{padding:15px 15px 4px}
    .scene .meta{font-size:11px;margin-bottom:6px}
    .scene .body{font-size:15px;line-height:1.8}
    .changes{margin:10px 15px 2px;gap:6px}
    .changes .c{font-size:11px;padding:3px 8px}

    .choices{padding:4px 10px 12px}
    .choices .hint{font-size:11px;padding:2px 2px 7px}
    .opt{padding:7px 10px;margin-bottom:5px;gap:8px}
    .opt .box{width:18px;height:18px}
    .opt .ti{font-size:14px}
    .opt .de{font-size:12px;margin-top:1px}

    .btn{padding:12px;font-size:15px;letter-spacing:1px}
    .btn-ghost{padding:12px 14px}

    .hero{padding:30px 18px 22px}
    .hero .seal-big{width:72px;height:72px;font-size:28px;margin-bottom:14px}
    .hero h1{font-size:24px;letter-spacing:4px}
    .hero .sub{font-size:13px;line-height:1.8}
    .hero .lines{margin:14px 0 18px;gap:6px}
    .hero .lines span{font-size:11px;padding:3px 10px}
    .start-actions{padding:0 18px 26px}
    .foot{padding:0 18px 20px}

    .card.pad{padding:18px}
    .ending{padding:24px 18px 8px}
    .ending h1{font-size:23px}
    .ending .summary{font-size:14px;line-height:1.9}
    .final-stats{padding:6px 18px 18px}
  }
</style>
</head>
<body>
<div class="wrap">

  <!-- 顶部标题条 -->
  <div class="topbar">
    <div class="brand">
      <div class="seal" id="topSeal">老</div>
      <div class="t" id="brandTitle">老夫人模拟器<small id="brandSub">选一种人生</small></div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="iconbtn" id="homeTop" title="返回首页" style="display:none;width:auto;padding:0 12px;font-size:13px">⌂ 首页</button>
      <button class="iconbtn" id="restartTop" title="重开一局" style="display:none;width:auto;padding:0 12px;font-size:13px">↺ 重开</button>
      <button class="iconbtn" id="gearBtn" title="设置">⚙</button>
    </div>
  </div>

  <!-- ============ 首页 · 模式选择 ============ -->
  <div id="view-home" class="card pad">
    <div class="home-hero">
      <h1>老夫人模拟器</h1>
      <p>同是花甲老妇,执掌的却是两种人生</p>
    </div>
    <div class="mode-list" id="modeList"><!-- JS 注入 --></div>
    <p class="foot" style="padding-bottom:4px">纯本地运行 · 剧情与 key 都只待在这台设备,不上传任何服务器</p>
  </div>

  <!-- ============ 开始页（模式介绍 / 开局） ============ -->
  <div id="view-start" class="card hidden">
    <div class="hero">
      <div class="seal-big" id="heroSeal">權</div>
      <h1 id="heroTitle">老夫人权谋</h1>
      <p class="sub" id="heroSub"></p>
      <div class="lines" id="heroLines"></div>
    </div>
    <div id="noKeyNotice" class="notice hidden">还没绑定 AI,先去设置里填一个自己的 key 才能开局 →</div>
    <div class="start-actions">
      <button class="btn btn-main" id="continueBtn" style="display:none">继续上一局</button>
      <button class="btn btn-main" id="newGameBtn">开局</button>
      <button class="btn btn-ghost" id="toSettingsBtn" style="flex:1">设置 AI 与开局难度</button>
      <button class="btn btn-ghost" id="backHomeBtn" style="flex:1">← 换一种人生</button>
    </div>
    <p class="foot">纯本地运行 · 剧情与 key 都只待在这台设备,不上传任何服务器</p>
  </div>

  <!-- ============ 设置页 ============ -->
  <div id="view-settings" class="card pad settings hidden">
    <h2>设置</h2>
    <p class="lead">填一个你自己的 AI key,游戏靠它实时生成剧情。key 只存在这台设备,永不上传。</p>

    <div class="field">
      <label for="provider">用哪家模型</label>
      <select id="provider">
        <option value="deepseek">DeepSeek（便宜、中文叙事强,推荐）</option>
        <option value="moonshot">Kimi / Moonshot（长上下文,剧情连贯）</option>
        <option value="zhipu">智谱 GLM（有免费额度）</option>
        <option value="qwen">通义千问 Qwen（阿里百炼）</option>
        <option value="openrouter">OpenRouter（一个 key 通多家）</option>
        <option value="gemini">Google Gemini（免费 key,需网络代理）</option>
        <option value="custom">自定义（任意 OpenAI 兼容接口）</option>
      </select>
    </div>

    <div class="field" id="baseField" style="display:none">
      <label for="baseurl">接口地址 Base URL（OpenAI 兼容 /chat/completions）</label>
      <input type="text" id="baseurl" placeholder="https://你的中转/v1/chat/completions" autocomplete="off" />
    </div>

    <div class="field">
      <label for="apikey">你的 API key（只存本机,永不上传）</label>
      <input type="password" id="apikey" placeholder="贴在这里" autocomplete="off" />
      <div class="hint" id="keyHint"></div>
    </div>

    <div class="field">
      <label for="model">模型名（厂商改名了照填,向后兼容）</label>
      <input type="text" id="model" autocomplete="off" />
    </div>

    <div class="field">
      <label for="difficulty">开局难度 / 烈度</label>
      <select id="difficulty">
        <option value="平稳">平稳——风波温和,容错高,适合看故事</option>
        <option value="标准" selected>标准——经典烈度,推荐</option>
        <option value="凶险">凶险——变故频仍,步步惊心</option>
      </select>
    </div>

    <div class="actbar">

    sys:(diff)=>`你是一款古风家庭生活文字模拟游戏的叙事引擎兼主持(GM)。严格按设定运行,只输出 JSON,不要任何额外文字。

【核心定位】
- 主角固定:一位寻常人家的老夫人(老太太),52-64岁,出身耕读/小康之家,与老伴相守(或早年丧偶),儿女渐渐成人。她操持家计、教养子女、张罗婚嫁、调和邻里,是这个家的主心骨。
- 家族姓氏:每开新局随机起一个寻常温厚的姓氏(如林、苏、周、何、许、孟、柳、陈等),整局一致,用 surname 字段返回(只填一个姓)。
- 玩法:相夫教子 + 持家理财 + 婚嫁成家 + 邻里人情,烟火温情、生活化,无朝堂权谋、无刀光杀伐。
- 时代:架空古代市井乡里,有田产、铺面、私塾、媒妁、街坊、宗族、节庆、灾年荒月、婚丧嫁娶、生老病死。
- 核心目标:把儿女教养成器、各自婚配立业,守住家睦与门风,攒下家底安度晚年,在乡里落个贤名,儿孙绕膝、福寿双全。

【固定开局模板】(仅第一回合用)
- 老夫人持家多年,儿女各有性情:可设长子(读书求功名或学手艺)、女儿(待字闺中或议亲中)、幼子(顽劣或聪慧)等,给名字与鲜明性情并保持一致;老伴可在世(性情各异)或已故。
- 开局抛出三桩家常牵挂同时存在:① 子女的前程/学业/品行隐忧;② 一桩家计难题(收成歉薄、铺面亏盈、借贷、修屋、看病花销);③ 一段人情往来(邻里纠纷、亲戚求助、议亲苗头)。

【四阶段脉络】
操持(前期):儿女年少,管教课业、操持家用、立家规、应付家计难关。
婚嫁(中期):儿女议亲说媒、成家立业、分炊置产、应对婆媳妯娌。
含饴(后期):儿孙出世、抱孙弄孙、调和小辈、张罗大小家事。
暮年(收束):寿数渐高,看儿孙是否成器、家宅是否和顺、晚景是否安乐。

【属性面板】(0-100,家用除外)
- harmony 家睦:家人和睦、夫妻子女融洽、长幼有序则涨;争吵、偏心、冷落、离心则降。
- reputation 邻里:乐善好施、知书达理、热心助人涨乡里口碑;刻薄、失信、结怨则降。
- health 康健:老夫人年事已高,只会逐年下降、绝不回升。操劳家务/忧心子女扣得多;含饴弄孙/安享清福也只能延缓损耗、扣得少,绝不增加。系统每回合都会自然衰减一点(前端强制),不要写出让康健上涨的剧情或数值,休养类选项应表述为「歇口气以减缓损耗」而非「恢复康健」。归零=油尽灯枯、安详离世立即落幕。
- children 儿女:子女成器、学业有成、品行端正、各自立业则涨;顽劣、败家、不孝则降。这是老夫人一生最重的牵挂。
- wealth 家用(白银·两):靠田产铺面、勤俭积攒而来;婚嫁聘嫁、修屋、看病、灾年、人情往来都要花。普通人家,数目以几十到几百两计。
- 家境门风(powerTag):隐藏综合档位,三档递进——寻常人家 / 和睦之家 / 兴旺门第。

【规则】
1. 每回合必须给出恰好 4 个选项,分别覆盖「持家 / 严教 / 慈和 / 张罗」四条路线(route 字段必须是这四个词之一);非结局回合 choices 绝不可为空、不可少于 4 项。玩家会勾选其中一项或多项合并执行。
2. 【多选惩罚·必须严格执行】同时操持的事越多,老夫人越劳神费钱,康健与家用的消耗随勾选数量叠加:选 1 项正常;2 项约 1.5 倍;3 项约 2 倍;4 项约 2.5-3 倍。增益也叠加但边际递减,绝不能让"全选 4 项"成为无脑稳赚。系统会注明本回合选了几项。
3. 收到玩家行动后:写一段精炼、连贯、有生活气与温度的剧情(scene,100-160 字,开局回合不超 220 字),交代关键经过与得失,凝练有人情味;然后更新全部数值(stats 给绝对值)。选项 detail 每条不超 25 字。
4. 剧情强制连贯:承接子女性情与前程、婚嫁进展、家计起落、老伴境况、邻里恩怨等所有伏笔,不重置、不遗忘。
5. 全程生活化、温情向,可有矛盾波折(婆媳不睦、子女败家、灾病横祸、负心悔婚、亲戚算计)但绝不涉权谋杀伐、朝堂争斗。
6. 难度=${diff}。凶险则家道多舛、变故频繁、数值波动大、人心更难测;平稳则相反。
7. 适时在 newAchievements 追加 1 个成就(如「长子中秀才」「幼女风光出阁」「修起三间新屋」「乡邻交口称贤」「抱上头孙」),没有给空数组。
8. 数值变化写进 changes(每项 name/delta/reason),delta 相对上一回合增减。
9. 阶段随回合推进,勿滞留前期:1-4 操持/5-9 婚嫁/10-13 含饴/14 起暮年。系统每回合附建议阶段,stage 必须据此推进。约 14-18 回合收束,逼近终局或触发结局条件即 ended=true。
10. 结局分圆满与遗憾,据实给出:圆满——儿孙满堂 / 教子有方 / 贤名乡里;遗憾——家道中落 / 子孙不肖 / 积劳成疾 / 孤苦暮年。当 wealth≤0,或 children 跌破 25,或 harmony 与 reputation 双双跌破 25 时,果断导向对应遗憾结局,而非强行圆满。

【输出 JSON 格式】(只输出这个对象,不要 markdown 代码块)
{ "surname":"林","stage":"操持 · 前期","scene":"...","stats":{"harmony":65,"reputation":60,"health":77,"children":55},"wealth":40,"powerTag":"和睦之家","powerDesc":"一句话描述家境门风","changes":[{"name":"康健","delta":-2,"reason":"操持家务"}],"newAchievements":[],"choices":[{"route":"持家","title":"...","detail":"..."},{"route":"严教","title":"...","detail":"..."},{"route":"慈和","title":"...","detail":"..."},{"route":"张罗","title":"...","detail":"..."}],"ended":false,"ending":null }
当 ended=true 时,choices 给空数组,并填 ending:{ "type":"儿孙满堂","title":"结局标题","summary":"150-250字凝练总结相夫教子的一生、儿女各自的归宿、晚景光景","epitaph":"一句乡里口碑式的评语","achievements":["5-9条这一生的关键成就"] }`,
  },
};

let currentModeId = localStorage.getItem("lfr_mode") || "";
function M(){ return MODES[(game && game.mode) || currentModeId] || MODES.quanmou; }
function suggestStage(turn){
  const st = M().stages;
  for(const [max,name] of st){ if(turn <= max) return name; }
  return st[st.length-1][1];
}

// 从剧情文本里兜底提取家族姓氏(模型偶尔忘了回 surname 字段)
const SURNAME_BAD = new Set(["侯","公","王","相","皇","宫","本","贵","世","国","官","太","老","府","开","回","相府","这","那","我","他","她"]);
function extractSurname(text){
  if(!text) return "";
  const re = /([一-龥]{1,2})府/g; let m;
  while((m = re.exec(text))){
    const s = m[1];
    if(!SURNAME_BAD.has(s) && !SURNAME_BAD.has(s[s.length-1])) return s.slice(0,2);
  }
  const m2 = text.match(/姓([一-龥])/) || text.match(/([一-龥]{1,2})(?:老夫人|老封君|老太君|老太太|家)/);
  return m2 ? m2[1] : "";
}
function updateSeal(){
  if(game && !game.surname){
    const s = extractSurname(game.lastScene);
    if(s) game.surname = s;
  }
  $("topSeal").textContent = (game && game.surname) ? game.surname[0] : M().seal;
}

function clampStat(v){ return Math.max(0, Math.min(100, Math.round(v))); }
function renderPanel(){
  updateSeal();
  const m = M();
  $("powerLabel").textContent = m.powerLabel;
  const grid = $("statsGrid");
  let html = "";
  m.stats.forEach(d=>{
    const v = clampStat(game.stats[d.key]);
    const prev = game.prevStats ? clampStat(game.prevStats[d.key]) : v;
    const diff = v - prev;
    const chip = diff!==0 ? `<span class="chip ${diff>0?'up':'down'}">${diff>0?'+':''}${diff}</span>` : "";
    html += `
      <div class="stat">
        <div class="lab"><b>${d.name}</b><span class="num">${v} ${chip}</span></div>
        <div class="bar ${d.cls}"><i style="width:${v}%"></i></div>
      </div>`;
  });
  // 钱(私财 / 家用)
  const mo = m.money, pw = game.wealth, pprev = game.prevStats ? game.prevStats._wealth : pw;
  const wdiff = (pprev!=null)? (pw - pprev): 0;
  const wchip = wdiff!==0 ? `<span class="chip ${wdiff>0?'up':'down'}">${wdiff>0?'+':''}${wdiff}</span>` : "";
  html += `
    <div class="stat">
      <div class="lab"><b>${mo.name}</b><span class="num"><span class="silver">${pw}</span><span style="font-size:11px;color:var(--ink-soft)"> ${mo.unit}</span> ${wchip}</span></div>
      <div class="bar ${mo.bar}"><i style="width:${Math.min(100, pw/mo.div)}%"></i></div>
    </div>`;
  grid.innerHTML = html;
  $("powerTag").textContent = game.powerTag || "—";
  $("powerDesc").textContent = game.powerDesc || "";
}

    </div>

function renderChoices(choices){
  selected = new Set();
  const ca = $("choiceArea");
  const m = M();
  let list = (Array.isArray(choices)?choices:[]).filter(c=> c && (c.title||c.detail));
  const usedFallback = list.length === 0;
  if(usedFallback) list = m.fallback.slice();
  game.lastChoices = list;
  const defRoute = m.routes[m.routes.length-1];
  const opts = list.map((c,i)=>`
    <button class="opt" data-i="${i}">
      <span class="box">✓</span>
      <span class="txt">
        <span class="rt rt-${c.route||defRoute}">${c.route||defRoute}</span><span class="ti">${escapeHtml(c.title||'')}</span>
        <div class="de">${escapeHtml(c.detail||'')}</div>
      </span>
    </button>`).join("");
  const fbHint = usedFallback ? `<div class="nochoice">AI 这回合没给出贴合选项,先用下面这组通用应对继续。</div>` : "";
  ca.innerHTML = `
    <div class="choices">
      <div class="hint">${m.hint}</div>
      ${fbHint}
      ${opts}
      <div class="actbar">
        <button class="btn btn-main" id="commitBtn">${m.commitBtn}</button>
      </div>
    </div>`;
  ca.querySelectorAll(".opt").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      const i = +btn.dataset.i;
      if(selected.has(i)){ selected.delete(i); btn.classList.remove("sel"); }
      else { selected.add(i); btn.classList.add("sel"); }
    });
  });
  $("commitBtn").addEventListener("click", commitTurn);
}
async function regenChoices(){
  showLoading("正在重新铺开抉择……");
  try{
    const data = await askModel(`（系统提示:上一回合你没有给出可选项。请基于当前局势,只补出本回合恰好 4 个抉择选项写进 choices(覆盖${M().routes.join("/")}),scene 字段留空,不要推进新剧情、不要改数值、不要结束游戏。）`);
    const clean = (Array.isArray(data.choices)?data.choices:[]).filter(c=> c && (c.title||c.detail));
    if(clean.length === 0){ renderChoices([]); saveGame(); return; }
    renderChoices(data.choices);
    saveGame();
  }catch(e){
    showError("没取到选项:"+e.message);
    const rb = $("retryBtn"); if(rb) rb.addEventListener("click", regenChoices);
  }
}
function escapeHtml(s){ return (s||"").replace(/[&<>]/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }

function showLoading(text){
  $("choiceArea").innerHTML = `
    <div class="loading">

      <div class="tip">${text||"老夫人正在斟酌……"}</div>
    </div>`;
}
function showError(msg){
  const ca = $("choiceArea");
  const box = document.createElement("div");
  box.className = "errbox";
  box.innerHTML = msg + '<br/><button class="btn btn-ghost" id="retryBtn" style="margin-top:10px;width:100%">重试这一步</button>';
  ca.innerHTML = "";
  ca.appendChild(box);
}

/* ===================== 与模型交互 ===================== */
function systemPrompt(){ return M().sys(cfg.difficulty); }

function buildUserMessage(actionText){
  const m = M();
  const snap = m.snap(game);
  if(game.turn === 0){ return m.openMsg(cfg.difficulty); }
  const nextTurn = game.turn + 1;
  const sug = suggestStage(nextTurn);
  const remain = MAX_TURNS - nextTurn;
  let pace = `\n\n【节奏控制】下一回合是第 ${nextTurn} 回合,本局以约 ${MAX_TURNS} 回合收官为基准,建议阶段应为「${sug}」——stage 字段必须推进到该阶段,绝不可滞留前期。`;
  if(remain <= 0)      pace += `已到收官回合,本回合必须给出结局并设 ended=true。`;
  else if(remain <= 2) pace += `距收尾仅约 ${remain} 回合,请加速收束,在最多 2 回合内导向结局,依局势而定。`;
  else                 pace += `距收尾约 ${remain} 回合,请让局势朝该阶段实质推进,不要原地踏步。`;
  return `${snap}${pace}\n\n【老夫人本回合的决断】\n${actionText}\n\n${m.turnTail}`;
}

async function askModel(actionText){
  const provider = cfg.provider;
  if(!cfg.key) throw new Error("还没填 API key,点右上角 ⚙ 去设置。");
  const sys = systemPrompt();
  const user = buildUserMessage(actionText);
  const messages = [{ role:"system", content:sys }];
  game.history.forEach(h=> messages.push(h));
  messages.push({ role:"user", content:user });

  let data;
  if(PROVIDERS[provider].kind === "gemini"){
    data = await callGemini(cfg.key, cfg.model, messages);
  } else {
    data = await callOpenAICompatible(cfg.base, cfg.key, cfg.model, messages);
  }
  game.history.push({ role:"user", content:user });
  game.history.push({ role:"assistant", content: JSON.stringify({scene:(data.scene||"").slice(0,600), stats:data.stats, powerTag:data.powerTag, stage:data.stage}) });
  if(game.history.length > 24) game.history = game.history.slice(-24);
  return data;
}

async function callOpenAICompatible(base, key, model, messages){
  const body = { model, messages, temperature:0.9, max_tokens:2200, response_format:{ type:"json_object" } };
  let r;
  try{
    r = await fetch(base, { method:"POST",
      headers:{ "Content-Type":"application/json", "Authorization":"Bearer "+key },
      body:JSON.stringify(body) });
  }catch(e){ throw new Error("网络请求没发出去:"+e.message+"。检查接口地址,或该接口是否允许浏览器跨域。"); }
  if(!r.ok){
    if(r.status===400){
      try{
        const r2 = await fetch(base,{method:"POST",
          headers:{ "Content-Type":"application/json", "Authorization":"Bearer "+key },
          body:JSON.stringify({ model, messages, temperature:0.9, max_tokens:2200 })});
        if(r2.ok){ const d2=await r2.json(); return JSON.parse(extractJson(d2?.choices?.[0]?.message?.content||"")); }
      }catch{}
    }
    throw new Error(await readErr(r));
  }
  const d = await r.json();
  const txt = d?.choices?.[0]?.message?.content;
  if(!txt) throw new Error("模型没返回内容,换个模型或稍后再试。");
  return JSON.parse(extractJson(txt));
}

async function callGemini(key, model, messages){
  const sys = messages.find(m=>m.role==="system")?.content || "";
  const contents = messages.filter(m=>m.role!=="system").map(m=>({
    role: m.role==="assistant" ? "model" : "user",
    parts:[{ text: m.content }]
  }));
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${encodeURIComponent(model)}:generateContent?key=${encodeURIComponent(key)}`;
  const body = {
    system_instruction:{ parts:[{ text:sys }] },
    contents,
    generationConfig:{ responseMimeType:"application/json", temperature:0.9, maxOutputTokens:2200 }
  };
  let r;
  try{ r = await fetch(url,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)}); }
  catch(e){ throw new Error("网络请求没发出去:"+e.message+"。Gemini 可能需要网络代理。"); }
  if(!r.ok) throw new Error(await readErr(r));
  const d = await r.json();
  const txt = d?.candidates?.[0]?.content?.parts?.[0]?.text;
  if(!txt) throw new Error("模型没返回内容（可能被安全过滤拦了）。");
  return JSON.parse(extractJson(txt));
}

function extractJson(s){
  s = (s||"").trim().replace(/^```(?:json)?/i,"").replace(/```$/,"").trim();
  const a = s.indexOf("{"), b = s.lastIndexOf("}");
  return (a>=0 && b>a) ? s.slice(a,b+1) : s;
}
async function readErr(r){
  let detail = "";
  try{ const j = await r.json(); detail = j?.error?.message || JSON.stringify(j); }
  catch{ detail = await r.text().catch(()=> ""); }
  return `请求失败(${r.status}):${detail||"无详情"}`;
}

/* ===================== 应用模型返回，更新游戏 ===================== */
function applyResult(data){
  const wasOpening = (game.turn === 0);
  const prevHealth = game.stats.health;
  game.prevStats = Object.assign({}, game.stats, { _wealth: game.wealth });
  if(data.stats){
    // 除 health 外的属性按当前模式逐项更新
    M().stats.forEach(d=>{
      const k = d.key;
      if(k === "health") return;
      if(typeof data.stats[k] === "number") game.stats[k] = clampStat(data.stats[k]);
    });
    // 康健:老夫人年事已高,只减不增——开局除外;再叠加每回合自然衰老
    if(wasOpening){
      if(typeof data.stats.health === "number") game.stats.health = clampStat(data.stats.health);
    } else {
      let h = (typeof data.stats.health === "number") ? clampStat(data.stats.health) : prevHealth;
      h = Math.min(h, prevHealth);
      const decay = (cfg.difficulty === "凶险") ? 2 : 1;
      game.stats.health = clampStat(h - decay);
      const realDelta = game.stats.health - prevHealth;
      data.changes = Array.isArray(data.changes) ? data.changes.filter(c=> c && c.name !== "康健") : [];
      if(realDelta !== 0){
        data.changes.push({ name:"康健", delta:realDelta,
          reason:(realDelta <= -decay-1) ? "操劳耗神,日渐衰朽" : "年事渐高,精力日减" });
      }
    }
  }
  if(typeof data.wealth === "number") game.wealth = Math.max(0, Math.round(data.wealth));
  if(data.surname && !game.surname){ game.surname = String(data.surname).replace(/[府氏家]$/,"").slice(0,2); }
  if(data.powerTag) game.powerTag = data.powerTag;
  if(data.powerDesc) game.powerDesc = data.powerDesc;
  if(Array.isArray(data.newAchievements)) data.newAchievements.forEach(a=>{ if(a && !game.achievements.includes(a)) game.achievements.push(a); });
  game.turn += 1;
  game.stage = suggestStage(game.turn);
  game.lastScene = data.scene || "";
  game.lastChoices = data.choices || [];
  if(wasOpening){ game.prevStats = null; data.changes = []; }

  // 健康归零兜底
  if(game.stats.health <= 0 && !data.ended){
    data.ended = true;
    data.ending = data.ending || M().deathEnding(game);
  }
  // 回合数硬兜底:即便 AI 不肯收尾,超过上限也强制收束
  if(!data.ended && game.turn >= MAX_TURNS + 3){
    data.ended = true;
    data.ending = data.ending || M().capEnding(game);
  }

  if(data.ended){
    game.ended = true;
    game.ending = data.ending;
    renderPanel();
    renderEnding(data.ending);
    saveGame();
    show("ending");
    return;
  }
  renderPanel();
  renderScene(data);
  const cleanChoices = (Array.isArray(data.choices)?data.choices:[]).filter(c=> c && (c.title||c.detail));
  if(cleanChoices.length === 0 && !game._regenTried){
    game._regenTried = true;
    saveGame();
    regenChoices();
    return;
  }
  game._regenTried = false;
  renderChoices(data.choices);
  saveGame();
}

/* ===================== 回合提交 ===================== */
async function commitTurn(){
  const picks = [];
  selected.forEach(i=>{ const c = game.lastChoices[i]; if(c) picks.push(`【${c.route}】${c.title}`); });
  if(picks.length===0){ toast("先勾选至少一项"); return; }
  const n = picks.length;
  const action = picks.join("；") +
    (n>1 ? `\n（本回合老夫人同时推进 ${n} 项行动,请按多选惩罚规则,把${M().penalty}的消耗按 ${n} 项显著叠加。）` : "");

  showLoading(M().loadingTurn);
  try{
    const data = await askModel(action);
    applyResult(data);
  }catch(e){
    showError("出了点岔子:"+e.message);
    const rb = $("retryBtn"); if(rb) rb.addEventListener("click", ()=>commitTurn());
  }
}

/* ===================== 开局 ===================== */
async function startNewGame(){
  if(!cfg.key){ show("settings"); loadSettingsToForm(); toast("先填一个 API key"); return; }
  game = freshGame(currentModeId || "quanmou");
  applyTopbar(game.mode);
  updateSeal();
  show("game");
  renderPanel();
  $("sceneArea").innerHTML = `<div class="scene"><div class="meta">楔子</div></div>`;
  $("choiceArea").innerHTML = `<div class="loading"><div class="spinner"></div><div class="tip">${M().loadingOpen}</div></div>`;
  try{
    const data = await askModel("");
    applyResult(data);
  }catch(e){
    showError("开局失败:"+e.message);
    const rb = $("retryBtn"); if(rb) rb.addEventListener("click", ()=>startNewGame());
  }
}

/* ===================== 结局渲染 ===================== */
function renderEnding(ending){
  ending = ending || {};
  const achs = (ending.achievements && ending.achievements.length) ? ending.achievements : game.achievements;
  const fs = M().finalStats(game);
  $("endingArea").innerHTML = `
    <div class="ending">
      <div class="ribbon">— 终 局 —</div>
      <div class="et">${escapeHtml(ending.type||"落幕")}</div>
      <h1>${escapeHtml(ending.title||"棋终人散")}</h1>
      <div class="summary">${escapeHtml(ending.summary||game.lastScene||"").replace(/\n/g,"<br/>")}</div>
      ${ending.epitaph?`<div class="epitaph">「${escapeHtml(ending.epitaph)}」</div>`:""}
    </div>
    <div class="achieve">
      <h3>生平成就</h3>
      <ul class="ach-list">
        ${(achs&&achs.length?achs:["（本局未记录特别成就）"]).map(a=>`<li>${escapeHtml(a)}</li>`).join("")}
      </ul>
    </div>
    <div class="final-stats">
      ${fs.map(([l,v])=>`<div class="fs"><span>${escapeHtml(l)}</span><b>${escapeHtml(String(v))}</b></div>`).join("")}
    </div>`;
}

/* ===================== 首页 / 模式 ===================== */
function renderHome(){
  const ids = ["quanmou","richang"];
  $("modeList").innerHTML = ids.map(id=>{
    const m = MODES[id];
    const saved = loadGame(id);
    const cont = saved ? `<span class="cont">· 有存档可继续</span>` : "";
    return `
      <button class="mode-card" data-mode="${id}">
        <div class="mc-seal ${m.sealCls}">${m.seal}</div>
        <div class="mc-body">
          <div class="mc-name">${m.homeName}${cont}</div>
          <div class="mc-desc">${m.homeDesc}</div>
          <div class="mc-tags">${m.homeTags.map(t=>`<span>${t}</span>`).join("")}</div>
        </div>
        <div class="mc-arrow">›</div>
      </button>`;
  }).join("");
  $("modeList").querySelectorAll(".mode-card").forEach(btn=>{
    btn.addEventListener("click", ()=> enterMode(btn.dataset.mode));
  });
}
function enterMode(modeId){
  currentModeId = modeId;
  localStorage.setItem("lfr_mode", modeId);
  game = null;
  fillStartPage();
  show("start");
}
function fillStartPage(){
  const m = MODES[currentModeId] || MODES.quanmou;
  applyTopbar(m.id);
  $("heroSeal").textContent = m.seal;
  $("heroSeal").className = "seal-big " + m.sealCls;
  $("heroTitle").textContent = m.heroTitle;
  $("heroSub").innerHTML = m.heroSub;
  $("heroLines").innerHTML = m.heroLines.map(t=>`<span>${t}</span>`).join("");
  $("newGameBtn").textContent = m.startBtn;
  refreshStartNotice();
}

/* ===================== 事件绑定 ===================== */
$("gearBtn").addEventListener("click", ()=>{ loadSettingsToForm(); show("settings"); });
$("toSettingsBtn").addEventListener("click", ()=>{ loadSettingsToForm(); show("settings"); });
$("settingsBackBtn").addEventListener("click", ()=>{ if(currentModeId){ refreshStartNotice(); show("start"); } else { show("home"); } });
$("settingsSaveBtn").addEventListener("click", ()=>{
  saveSettingsFromForm(); toast("设置已保存");
  if(currentModeId){ refreshStartNotice(); show("start"); } else { renderHome(); show("home"); }
});
$("noKeyNotice").addEventListener("click", ()=>{ loadSettingsToForm(); show("settings"); });
$("newGameBtn").addEventListener("click", startNewGame);
$("backHomeBtn").addEventListener("click", ()=>{ renderHome(); show("home"); });
$("homeTop").addEventListener("click", ()=>{ if(confirm("返回首页?当前对局进度已自动保存,可从首页继续。")){ renderHome(); show("home"); } });
$("continueBtn").addEventListener("click", ()=>{
  const saved = loadGame(currentModeId);
  if(!saved){ toast("没有存档"); return; }
  game = saved;
  if(!game.mode) game.mode = currentModeId;
  applyTopbar(game.mode);
  updateSeal();
  if(game.ended){ show("ending"); renderPanel(); renderEnding(game.ending); return; }
  show("game"); renderPanel();
  renderScene({ scene:game.lastScene, stage:game.stage, changes:[] });
  renderChoices(game.lastChoices);
});
$("restartTop").addEventListener("click", ()=>{ if(confirm("确定重开一局?当前进度会被覆盖。")) startNewGame(); });
$("endingRestartBtn").addEventListener("click", startNewGame);
$("endingHomeBtn").addEventListener("click", ()=>{ renderHome(); show("home"); });

function refreshStartNotice(){
  $("noKeyNotice").classList.toggle("hidden", !!cfg.key);
  const saved = loadGame(currentModeId);
  $("continueBtn").style.display = saved ? "block" : "none";
}

/* ===================== 初始化 ===================== */
loadSettingsToForm();
renderHome();
show("home");
</script>
